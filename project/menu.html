<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rugby Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="menu">
        <img src="logost.png" alt="Stade Toulousain" id="logo-st">
        <h1>RUGBY RUN</h1>
        <p>Choose your level:</p>
        <button class="btn-niveau facile" onclick="window.location.href='level1.html'">Level 1 — Jump</button>
        <button class="btn-niveau moyen" onclick="window.location.href='level2.html'">Level 2 — Slide</button>
        <button class="btn-niveau difficile" onclick="window.location.href='level3.html'">Level 3 — Full</button>
        <p>Speed:</p>
        <div id="vitesse-buttons">
            <button class="btn-vitesse selected" onclick="setVelocite(this, -5)">
                <span class="club-logo"><img src="logo castres.png" alt="Castres"></span>
                <span class="club-label">1 — Castres</span>
            </button>
            <button class="btn-vitesse" onclick="setVelocite(this, -8)">
                <span class="club-logo"><img src="logo larochelle.png" alt="La Rochelle"></span>
                <span class="club-label">2 — La Rochelle</span>
            </button>
            <button class="btn-vitesse" onclick="setVelocite(this, -12)">
                <span class="club-logo"><img src="logo bordeaux.png" alt="Bordeaux"></span>
                <span class="club-label">3 — Bordeaux</span>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        localStorage.setItem('velocite', -5);
        function setVelocite(btn, v) {
            localStorage.setItem('velocite', v);
            document.querySelectorAll('.btn-vitesse').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
    </script>
</body>
</html>
