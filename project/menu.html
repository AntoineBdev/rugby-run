<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jump Rugby</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="menu">
        <h1>🏉 JUMP RUGBY</h1>
        <p>Choisis ton niveau :</p>
        <button class="btn-niveau facile" onclick="window.location.href='level1.html'">Niveau 1 - Saut</button>
        <button class="btn-niveau moyen" onclick="window.location.href='level2.html'">Niveau 2 - Glissade</button>
        <button class="btn-niveau difficile" onclick="window.location.href='level3.html'">Niveau 3 - Complet</button>
        <p>Vitesse :</p>
        <div id="vitesse-buttons">
            <button class="btn-vitesse selected" onclick="setVelocite(this, -5)">1</button>
            <button class="btn-vitesse" onclick="setVelocite(this, -8)">2</button>
            <button class="btn-vitesse" onclick="setVelocite(this, -12)">3</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        localStorage.setItem('velocite', -5);
        function setVelocite(btn, v) {
            localStorage.setItem('velocite', v);
            document.querySelectorAll('.btn-vitesse').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
    </script>
</body>
</html>
